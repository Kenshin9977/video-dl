name: Build & Release

on:
  push:
    tags:
      - "v*"
  # Auto-release tags from a workflow, and a tag pushed with the GITHUB_TOKEN does
  # not trigger another workflow. It dispatches this one on the tag ref instead.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            spec: specs/Windows-video-dl.spec
            artifact: video-dl-windows.exe
          - os: ubuntu-22.04
            spec: specs/Linux-video-dl.spec
            artifact: video-dl-linux
          - os: macos-latest
            spec: specs/macOS-video-dl.spec
            artifact: video-dl-macos.dmg

    runs-on: ${{ matrix.os }}

    # Hoisted to the job so the signing step's `if:` can test it. A step's own
    # `env:` is not visible to its own `if:` — the condition is evaluated first —
    # and the `secrets` context is not available there at all.
    env:
      SIGN_SSH_HOST: ${{ secrets.SIGN_SSH_HOST }}

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Generate macOS icon
        if: runner.os == 'macOS'
        run: |
          ICONSET=$(mktemp -d)/icon.iconset
          mkdir -p "$ICONSET"
          for s in 16 32 128 256 512; do
            sips -z $s $s icon.png --out "$ICONSET/icon_${s}x${s}.png" >/dev/null
          done
          for s in 16 32 128 256; do
            s2=$((s * 2))
            sips -z $s2 $s2 icon.png --out "$ICONSET/icon_${s}x${s}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o icon.icns

      - name: Build binary
        run: uv run pyinstaller ${{ matrix.spec }}

      # `--help` exits inside argparse, before the app imports flet, yt_dlp or
      # tufup, so it cannot catch a missing PyInstaller hiddenimport. `--selftest`
      # imports them all and exits, without initializing paths (that would try to
      # download ffmpeg on the runner).
      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: ./dist/video-dl.exe --selftest

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: ./dist/video-dl --selftest

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        run: ./dist/video-dl.app/Contents/MacOS/video-dl --selftest

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: mv dist/video-dl.exe "${{ matrix.artifact }}"

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: mv dist/video-dl "${{ matrix.artifact }}"

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "video-dl" \
            -srcfolder dist/video-dl.app \
            -ov -format UDZO \
            "${{ matrix.artifact }}"

      # Authenticode-sign here, inside the build job, BEFORE the artifact is
      # uploaded — the `sign` job below hashes these artifacts into the tufup
      # metadata, so signing afterwards would leave the update channel pointing at
      # the unsigned bytes. Signing changes the file, so it has to come first.
      #
      # The action signs on a remote host over SSH (the key never touches CI) and
      # then refuses to continue unless Windows itself reports the result as Valid
      # and timestamped. Skipped, non-fatally, when the secrets are absent — a fork
      # still builds green, just unsigned.
      - name: Sign the Windows binary
        if: runner.os == 'Windows' && env.SIGN_SSH_HOST != ''
        uses: Kenshin9977/Discord-Overlay/.github/actions/sign-windows@sign-windows-v1
        with:
          files: ${{ matrix.artifact }}
          ssh-host: ${{ secrets.SIGN_SSH_HOST }}
          ssh-key: ${{ secrets.SIGN_SSH_KEY }}
          known-hosts: ${{ secrets.SIGN_SSH_KNOWN_HOSTS }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  android:
    runs-on: ubuntu-latest
    env:
      ANDROID_LIBS: android_libs/arm64-v8a
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      # deps.py is the only place these are written down, so a Renovate bump lands
      # in one file and reaches CI, the Makefile and the runtime installers at once.
      # It imports nothing, so a bare python can read it before anything is set up.
      - name: Read the pinned binary versions
        run: |
          for pin in FFMPEG_ANDROID_TAG FFMPEG_ANDROID_ASSET_PATTERN ARIA2_TAG QUICKJS_COMMIT QUICKJS_REPO NDK_VERSION; do
            echo "$pin=$(python3 deps.py "$pin")" >> "$GITHUB_ENV"
          done

      - name: Install Python dependencies
        run: uv sync --locked

      # flet builds the APK with Flutter, and it only accepts the exact Flutter
      # version it was built against: `channel: stable` handed it 3.44.6, flet wanted
      # 3.41.2, and it stopped dead on "Flutter SDK not found or invalid version".
      #
      # Read the version out of the installed flet rather than pinning it here. A pin
      # would be a second place to remember, and it would go stale the next time
      # Renovate bumps flet, which is the moment nobody is watching.
      - name: Read the Flutter version flet was built against
        id: flutter
        run: |
          version=$(uv run python -c "from flet.version import flutter_version; print(flutter_version)")
          echo "flet $(uv run python -c "import importlib.metadata as m; print(m.version('flet'))") wants Flutter $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # No `cache: gradle` here. The Gradle project does not exist at checkout time,
      # `flet build` generates it, so the action finds nothing to key a cache on and
      # fails the job before it has started.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter.outputs.version }}
          channel: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache the NDK
        id: ndk-cache
        uses: actions/cache@v6
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          key: ndk-${{ env.NDK_VERSION }}

      - name: Install the NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;${NDK_VERSION}"

      - name: Fetch FFmpeg
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$ANDROID_LIBS"
          rm -rf /tmp/ffmpeg-android && mkdir -p /tmp/ffmpeg-android
          gh release download "$FFMPEG_ANDROID_TAG" --repo "$(python3 deps.py FFMPEG_ANDROID_REPO)" \
            --pattern "$FFMPEG_ANDROID_ASSET_PATTERN" --dir /tmp/ffmpeg-android
          # The asset carries the build number, and the directory inside it carries
          # the same. Read both back rather than guessing either.
          archive=$(find /tmp/ffmpeg-android -name '*.tar.xz')
          tar xf "$archive" -C /tmp/ffmpeg-android
          unpacked=$(find /tmp/ffmpeg-android -mindepth 1 -maxdepth 1 -type d)
          cp "$unpacked/bin/ffmpeg" "$unpacked/bin/ffprobe" "$ANDROID_LIBS/"
          cp "$unpacked"/lib/*.so "$ANDROID_LIBS/"

      - name: Fetch aria2c
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$ARIA2_TAG" --repo "$(python3 deps.py ARIA2_REPO)" \
            --pattern "aria2c-android-aarch64" --pattern "SHA256SUMS" --dir /tmp --clobber
          (cd /tmp && grep " aria2c-android-aarch64$" SHA256SUMS | sha256sum -c -)
          cp /tmp/aria2c-android-aarch64 "$ANDROID_LIBS/aria2c"
          chmod +x "$ANDROID_LIBS/aria2c"

      - name: Cache the QuickJS build
        id: quickjs-cache
        uses: actions/cache@v6
        with:
          path: android_libs/qjs
          key: quickjs-${{ env.QUICKJS_COMMIT }}-ndk-${{ env.NDK_VERSION }}

      - name: Build QuickJS for ARM64
        if: steps.quickjs-cache.outputs.cache-hit != 'true'
        run: |
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          git clone "$QUICKJS_REPO" /tmp/quickjs-bellard
          cd /tmp/quickjs-bellard
          git checkout "$QUICKJS_COMMIT"
          CC="$NDK_BIN/clang --target=aarch64-linux-android24 --sysroot=$NDK_BIN/../sysroot"
          CFLAGS="-D_GNU_SOURCE -DCONFIG_VERSION=\"$(cat VERSION)\" -O2 -flto -funsigned-char -fwrapv"
          for f in qjs quickjs quickjs-libc cutils dtoa libregexp libunicode; do
            $CC $CFLAGS -c -o $f.o $f.c
          done
          echo 'const unsigned char qjsc_repl[] = {0}; const unsigned int qjsc_repl_size = 0;' > repl_stub.c
          $CC $CFLAGS -c -o repl_stub.o repl_stub.c
          $CC -static -flto -o qjs qjs.o quickjs.o quickjs-libc.o cutils.o dtoa.o libregexp.o libunicode.o repl_stub.o -lm -ldl
          $NDK_BIN/llvm-strip qjs
          mkdir -p "$GITHUB_WORKSPACE/android_libs"
          cp qjs "$GITHUB_WORKSPACE/android_libs/qjs"

      - name: Stage QuickJS
        run: cp android_libs/qjs "$ANDROID_LIBS/qjs"

      # The solver library is versioned together with the yt-dlp-ejs package that
      # yt-dlp pulls in. Read the version back out of what is actually installed,
      # so it cannot disagree with the lock file the way a second pin would.
      - name: Fetch the EJS solver lib
        run: |
          ejs_version=$(uv run python -c "import importlib.metadata as m; print(m.version('yt-dlp-ejs'))")
          echo "yt-dlp resolved yt-dlp-ejs $ejs_version"
          ejs_dir=$(uv run python -c "import yt_dlp, os; print(os.path.join(os.path.dirname(yt_dlp.__file__), 'extractor/youtube/jsc/_builtin/vendor'))")
          curl -fSL -o "$ejs_dir/yt.solver.lib.js" \
            "https://github.com/yt-dlp/ejs/releases/download/${ejs_version}/yt.solver.lib.js"

      - name: Inject native libs
        run: |
          JNILIBS=build/flutter/android/app/src/main/jniLibs/arm64-v8a
          mkdir -p "$JNILIBS"
          cp "$ANDROID_LIBS/ffmpeg" "$JNILIBS/libffmpeg.so"
          cp "$ANDROID_LIBS/ffprobe" "$JNILIBS/libffprobe.so"
          cp "$ANDROID_LIBS"/lib*.so "$JNILIBS/"
          cp "$ANDROID_LIBS/qjs" "$JNILIBS/libqjs.so"
          cp "$ANDROID_LIBS/aria2c" "$JNILIBS/libaria2c.so"

      # arm64-v8a only, on purpose. The native libs above are injected into that
      # ABI alone, and ffmpeg, aria2c and qjs are only built for aarch64 upstream,
      # so an armeabi-v7a or x86_64 APK would install and then fail at the first
      # download or mux. Publishing one working APK beats publishing three of
      # which two are broken.
      - name: Build APK
        run: |
          uv run flet build apk \
            --project video-dl \
            --org com.videodl \
            --product "Video-dl" \
            --description "Download and encode videos" \
            --module-name main_android \
            --compile-app --compile-packages --cleanup-packages \
            --skip-flutter-doctor \
            --split-per-abi \
            --exclude .venv venv dist .git .mypy_cache .ruff_cache .pytest_cache \
              __pycache__ .coverage "*.log" "*.egg-info" tests docs \
              htmlcov .tox build Makefile "*.icns" "*.ico" "*.spec" \
              check_results.txt test_outdir android_libs \
            --android-permissions INTERNET=True WRITE_EXTERNAL_STORAGE=True READ_EXTERNAL_STORAGE=True MANAGE_EXTERNAL_STORAGE=True \
            --android-adaptive-icon-background "#7C3AED"

      - name: Keep only the ABI we ship
        run: |
          shopt -s nullglob
          apk=(build/apk/*arm64-v8a*.apk)
          if [ ${#apk[@]} -ne 1 ]; then
            echo "::error::expected exactly one arm64-v8a APK, found ${#apk[@]}"
            exit 1
          fi
          mkdir -p release_apk
          mv "${apk[0]}" release_apk/video-dl-arm64-v8a.apk
          ls -lh release_apk/

      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: release_apk/video-dl-arm64-v8a.apk

  sign:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Restore signing keys
        run: |
          mkdir -p keystore
          echo "${{ secrets.TUFUP_PRIVATE_KEY }}" | base64 -d > keystore/video_dl_key
          chmod 600 keystore/video_dl_key
          echo "${{ secrets.TUFUP_PUBLIC_KEY }}" | base64 -d > keystore/video_dl_key.pub
          echo "${{ secrets.TUFUP_CONFIG }}" | base64 -d > .tufup-repo-config

      # The tufup repository is the state of the update channel: its snapshot and
      # timestamp version numbers only ever go up, and a client rejects metadata
      # that goes backwards. Restoring a fresh repo instead of the real one would
      # reset those counters to 1 and permanently brick auto-update for everyone
      # already installed. So a failed restore fails the release. Bootstrapping an
      # empty channel is a deliberate act: set the TUFUP_BOOTSTRAP repository
      # variable to 1 for that one run.
      - name: Restore tufup repository
        env:
          GH_TOKEN: ${{ github.token }}
          TUFUP_REPO_ARCHIVE: ${{ secrets.TUFUP_REPO_ARCHIVE }}
          TUFUP_BOOTSTRAP: ${{ vars.TUFUP_BOOTSTRAP }}
        run: |
          set -euo pipefail
          if gh release download --repo "$GITHUB_REPOSITORY" --pattern "tufup-repo.tar.gz" --dir /tmp; then
            tar -xzf /tmp/tufup-repo.tar.gz
            echo "Restored the tufup repo from the previous release"
          elif [ -n "${TUFUP_REPO_ARCHIVE:-}" ]; then
            echo "$TUFUP_REPO_ARCHIVE" | base64 -d | tar -xzf -
            echo "Restored the tufup repo from the TUFUP_REPO_ARCHIVE secret"
          elif [ "${TUFUP_BOOTSTRAP:-}" = "1" ]; then
            mkdir -p repository/metadata repository/targets
            cp root.json repository/metadata/root.json
            echo "Bootstrapped a fresh tufup repo (TUFUP_BOOTSTRAP=1)"
          else
            echo "::error::Could not restore the tufup repository from the previous release."
            echo "::error::Publishing now would reset TUF metadata versions and break auto-update"
            echo "::error::for every installed client. Fix the restore, or set the TUFUP_BOOTSTRAP"
            echo "::error::repository variable to 1 if you really mean to start a fresh channel."
            exit 1
          fi
          test -f repository/metadata/root.json

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sign all platform artifacts
        run: |
          uv run python -m tools.ci_sign \
            --version "${{ steps.version.outputs.version }}" \
            --artifacts-dir artifacts \
            --keys-dir keystore \
            --repo-dir repository

      - name: Prune old targets from tufup repo
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          find repository/targets -name '*.tar.gz' ! -name "*-${VERSION}.tar.gz" -delete
          echo "Remaining targets:" && ls -lh repository/targets/

      - name: Package signed files
        run: |
          mkdir -p signed
          cp repository/metadata/*.json signed/
          cp repository/targets/*-${{ steps.version.outputs.version }}.tar.gz signed/ 2>/dev/null || true
          tar -czf signed/tufup-repo.tar.gz -C . repository/

      - uses: actions/upload-artifact@v7
        with:
          name: tufup-signed
          path: signed/

  release:
    needs: [build, android, sign]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      # No `|| true` here. A missing binary used to produce a green release with
      # the binary silently absent from it.
      - name: Organize release assets
        run: |
          set -euo pipefail
          mkdir -p binaries tufup
          for binary in video-dl-windows.exe video-dl-linux video-dl-macos.dmg video-dl-arm64-v8a.apk; do
            mv "artifacts/$binary" binaries/
          done
          mv artifacts/* tufup/
          echo "=== Binaries ===" && ls -la binaries/
          echo "=== Tufup ===" && ls -la tufup/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            binaries/*
            tufup/*
          body: |
            ## Download

            | Windows | macOS | Linux | Android (ARM64) |
            |:-------:|:-----:|:-----:|:---------------:|
            | [video-dl-windows.exe](https://github.com/Kenshin9977/video-dl/releases/download/${{ github.ref_name }}/video-dl-windows.exe) | [video-dl-macos.dmg](https://github.com/Kenshin9977/video-dl/releases/download/${{ github.ref_name }}/video-dl-macos.dmg) | [video-dl-linux](https://github.com/Kenshin9977/video-dl/releases/download/${{ github.ref_name }}/video-dl-linux) | [video-dl-arm64-v8a.apk](https://github.com/Kenshin9977/video-dl/releases/download/${{ github.ref_name }}/video-dl-arm64-v8a.apk) |

            <details>
            <summary>Auto-update files (internal)</summary>

            The remaining files in this release are used by the built-in auto-updater (tufup). You can safely ignore them.
            </details>
