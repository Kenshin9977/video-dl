name: Build & Release

on:
  push:
    tags:
      - "v*"
  # Auto-release tags from a workflow, and a tag pushed with the GITHUB_TOKEN does
  # not trigger another workflow. It dispatches this one on the tag ref instead.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            spec: specs/Windows-video-dl.spec
            artifact: video-dl-windows.exe
          - os: ubuntu-22.04
            spec: specs/Linux-video-dl.spec
            artifact: video-dl-linux
          - os: macos-latest
            spec: specs/macOS-video-dl.spec
            artifact: video-dl-macos.dmg

    runs-on: ${{ matrix.os }}

    # Hoisted to the job so the signing steps' `if:` can test them. A step's own
    # `env:` is not visible to its own `if:` — the condition is evaluated first —
    # and the `secrets` context is not available there at all.
    env:
      SIGN_SSH_HOST: ${{ secrets.SIGN_SSH_HOST }}
      MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Generate macOS icon
        if: runner.os == 'macOS'
        run: |
          ICONSET=$(mktemp -d)/icon.iconset
          mkdir -p "$ICONSET"
          for s in 16 32 128 256 512; do
            sips -z $s $s icon.png --out "$ICONSET/icon_${s}x${s}.png" >/dev/null
          done
          for s in 16 32 128 256; do
            s2=$((s * 2))
            sips -z $s2 $s2 icon.png --out "$ICONSET/icon_${s}x${s}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o icon.icns

      - name: Build binary
        run: uv run pyinstaller ${{ matrix.spec }}

      # `--help` exits inside argparse, before the app imports flet, yt_dlp or
      # tufup, so it cannot catch a missing PyInstaller hiddenimport. `--selftest`
      # imports them all and exits, without initializing paths (that would try to
      # download ffmpeg on the runner).
      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: ./dist/video-dl.exe --selftest

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: ./dist/video-dl --selftest

      # Python 3.14 (python-build-standalone) builds the stdlib's pyexpat against
      # CPython's vendored expat 2.7.2+, but links it to the system
      # /usr/lib/libexpat.1.dylib, which on macOS is older and lacks
      # XML_SetAllocTrackerActivationThreshold. Reading any XML or .plist then crashes
      # the app on machines whose system expat is too old (macOS 26 among them). Ship
      # our own expat and point the stdlib .so files at it, so the app stops depending
      # on whatever expat the OS happens to carry. Runs for every macOS build, signed
      # or not; the signing step below re-signs the .so files it rewrites here.
      - name: Bundle a current libexpat (macOS)
        if: runner.os == 'macOS'
        env:
          EXPAT_VERSION: "2.7.5"
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/expat.tar.gz \
            "https://github.com/libexpat/libexpat/releases/download/R_${EXPAT_VERSION//./_}/expat-${EXPAT_VERSION}.tar.gz"
          tar xf /tmp/expat.tar.gz -C /tmp
          (cd "/tmp/expat-${EXPAT_VERSION}" && \
            ./configure --prefix=/tmp/expat-out --without-docbook --without-examples --without-tests >/dev/null && \
            make -j3 >/dev/null && make install >/dev/null)

          APP=dist/video-dl.app
          dyld=$(dirname "$(find "$APP" -name 'pyexpat*.so' | head -1)")
          # -type f picks the real dylib, not the libexpat.1.dylib / libexpat.dylib
          # symlinks make install also drops next to it.
          src=$(find /tmp/expat-out/lib -name 'libexpat.*.dylib' -type f | head -1)
          cp "$src" "$dyld/libexpat.1.dylib"
          chmod u+w "$dyld/libexpat.1.dylib"
          install_name_tool -id @loader_path/libexpat.1.dylib "$dyld/libexpat.1.dylib"
          codesign --force --sign - "$dyld/libexpat.1.dylib"

          # pyexpat and _elementtree both link expat, both live next to it in
          # lib-dynload, so @loader_path resolves for each. Ad-hoc re-sign here so an
          # unsigned fork build still loads them; the Developer ID step re-signs later.
          repointed=0
          while IFS= read -r so; do
            if otool -L "$so" | grep -q '/usr/lib/libexpat.1.dylib'; then
              chmod u+w "$so"
              install_name_tool -change /usr/lib/libexpat.1.dylib @loader_path/libexpat.1.dylib "$so"
              codesign --force --sign - "$so"
              echo "repointed $(basename "$so")"
              repointed=$((repointed + 1))
            fi
          done < <(find "$APP" -name '*.so')
          if [ "$repointed" -eq 0 ]; then
            echo "::error::no .so linked the system libexpat; the bundling assumption changed"
            exit 1
          fi

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        run: ./dist/video-dl.app/Contents/MacOS/video-dl --selftest

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: mv dist/video-dl.exe "${{ matrix.artifact }}"

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: mv dist/video-dl "${{ matrix.artifact }}"

      # Developer ID signing + notarization, the non-App-Store path. It runs before
      # the DMG is built (the app has to be signed and stapled first) and, like the
      # Windows signing below, before the artifact is uploaded, so the tufup `sign`
      # job hashes signed bytes. Skipped, non-fatally, when the cert secret is
      # absent — a fork still builds green, just unsigned.
      #
      # The keychain, notary key and identity set up here persist on the runner for
      # the DMG-signing step in the same job.
      - name: Sign and notarize the app (macOS)
        if: runner.os == 'macOS' && env.MACOS_CERT_P12 != ''
        env:
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
        run: |
          set -euo pipefail
          APP=dist/video-dl.app

          # An ephemeral keychain with a random password, torn down with the runner.
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Put it on the search list so codesign and notarytool find the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk '/Developer ID Application/{print $2; exit}')
          test -n "$IDENTITY"

          # Sign every Mach-O under a directory tree, inner-out (deepest first) so each
          # seal is valid when its enclosing bundle is sealed over it. Runtime on all;
          # the caller re-signs bundle main-executables with entitlements afterward.
          sign_tree() {
            find "$1" -type f | while IFS= read -r f; do
              if file "$f" | grep -q 'Mach-O'; then echo "$f"; fi
            done | awk '{print gsub(/\//,"/"), $0}' | sort -rn | cut -d' ' -f2- \
            | while IFS= read -r f; do
              codesign --force --options runtime --timestamp --sign "$IDENTITY" "$f"
            done
          }

          # flet ships the Flutter UI as an unsigned Flet.app inside this tarball. find
          # never sees it (it is compressed), but the notary service unpacks the archive
          # and rejects the whole submission over it. Extract, sign Flet.app, repack —
          # before the outer app is sealed over the tarball's bytes below.
          FLET_TGZ=$(find "$APP/Contents" -name 'flet-macos.tar.gz' | head -1)
          if [ -n "$FLET_TGZ" ]; then
            work="$RUNNER_TEMP/flet"
            rm -rf "$work"; mkdir -p "$work"
            tar -xzf "$FLET_TGZ" -C "$work"
            sign_tree "$work"
            FLET_APP=$(find "$work" -maxdepth 2 -name 'Flet.app' | head -1)
            codesign --force --options runtime --timestamp \
              --entitlements specs/macos-entitlements.plist --sign "$IDENTITY" "$FLET_APP"
            tar -czf "$FLET_TGZ" -C "$work" $(ls "$work")
          fi

          # The main executable and bundle carry the entitlements; dylibs neither need
          # nor accept them.
          sign_tree "$APP"
          codesign --force --options runtime --timestamp \
            --entitlements specs/macos-entitlements.plist \
            --sign "$IDENTITY" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

          # notarytool wants an archive, not a raw .app. Zip it, submit, then staple
          # the ticket onto the .app itself so first launch works offline.
          echo "$MACOS_NOTARY_KEY" | base64 -d > "$RUNNER_TEMP/notary.p8"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/app.zip"
          NOTARY_KEY="$RUNNER_TEMP/notary.p8" bash tools/notarize.sh "$RUNNER_TEMP/app.zip"
          xcrun stapler staple "$APP"

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "video-dl" \
            -srcfolder dist/video-dl.app \
            -ov -format UDZO \
            "${{ matrix.artifact }}"

      # Sign, notarize and staple the DMG too: the .app inside is already stapled,
      # but stapling the DMG means the download the user actually double-clicks
      # passes Gatekeeper offline as well. Reuses the keychain and notary key the
      # app-signing step left on the runner.
      - name: Sign and notarize the DMG (macOS)
        if: runner.os == 'macOS' && env.MACOS_CERT_P12 != ''
        env:
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
        run: |
          set -euo pipefail
          DMG="${{ matrix.artifact }}"
          IDENTITY=$(security find-identity -v -p codesigning "$RUNNER_TEMP/signing.keychain-db" \
            | awk '/Developer ID Application/{print $2; exit}')
          codesign --force --timestamp --sign "$IDENTITY" "$DMG"
          NOTARY_KEY="$RUNNER_TEMP/notary.p8" bash tools/notarize.sh "$DMG"
          xcrun stapler staple "$DMG"
          # Gatekeeper's own verdict, or the release does not go out. --deep for the
          # app is deprecated, but for a DMG spctl assesses the mounted contents.
          spctl --assess --type open --context context:primary-signature -vv "$DMG"

      # Authenticode-sign here, inside the build job, BEFORE the artifact is
      # uploaded — the `sign` job below hashes these artifacts into the tufup
      # metadata, so signing afterwards would leave the update channel pointing at
      # the unsigned bytes. Signing changes the file, so it has to come first.
      #
      # The action signs on a remote host over SSH (the key never touches CI) and
      # then refuses to continue unless Windows itself reports the result as Valid
      # and timestamped. Skipped, non-fatally, when the secrets are absent — a fork
      # still builds green, just unsigned.
      - name: Sign the Windows binary
        if: runner.os == 'Windows' && env.SIGN_SSH_HOST != ''
        uses: Kenshin9977/Discord-Overlay/.github/actions/sign-windows@sign-windows-v1
        with:
          files: ${{ matrix.artifact }}
          ssh-host: ${{ secrets.SIGN_SSH_HOST }}
          ssh-key: ${{ secrets.SIGN_SSH_KEY }}
          known-hosts: ${{ secrets.SIGN_SSH_KNOWN_HOSTS }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      # A bare portable exe leaves a non-technical user with a file in Downloads and
      # no shortcut, not knowing how to launch it. The installer gives them a Start
      # Menu and desktop entry. It is a first-run convenience only: it installs to a
      # per-user location tufup can write to, and updates still happen in place, so
      # the installer is never part of the tufup update channel.
      #
      # It wraps the already-signed portable exe, so this must run after signing.
      # root.json is installed next to the exe because the onefile build keeps it
      # inside the archive, where the updater cannot find it to bootstrap trust.
      - name: Build the Windows installer
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          iscc="/c/Program Files (x86)/Inno Setup 6/ISCC.exe"
          # Inno Setup is preinstalled on the runner; install only if a future image
          # drops it.
          [ -f "$iscc" ] || choco install innosetup --no-progress -y
          mkdir -p installer_build
          cp "${{ matrix.artifact }}" installer_build/video-dl.exe
          cp root.json icon.ico installer_build/
          version=$(python -c "import version; print(version.__version__)")
          # MSYS_NO_PATHCONV stops Git-bash rewriting the /D... options and the C:/
          # path into POSIX paths; without it ISCC sees "//DSourceDir=..." and rejects
          # it. pwd -W gives a native path Inno can resolve.
          MSYS_NO_PATHCONV=1 "$iscc" \
            "/DAppVersion=$version" \
            "/DSourceDir=$(pwd -W)/installer_build" \
            installer/video-dl.iss
          mv installer_build/video-dl-windows-setup.exe .

      - name: Sign the Windows installer
        if: runner.os == 'Windows' && env.SIGN_SSH_HOST != ''
        uses: Kenshin9977/Discord-Overlay/.github/actions/sign-windows@sign-windows-v1
        with:
          files: video-dl-windows-setup.exe
          ssh-host: ${{ secrets.SIGN_SSH_HOST }}
          ssh-key: ${{ secrets.SIGN_SSH_KEY }}
          known-hosts: ${{ secrets.SIGN_SSH_KNOWN_HOSTS }}

      - name: Upload the installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: video-dl-windows-setup.exe
          path: video-dl-windows-setup.exe

  android:
    runs-on: ubuntu-latest
    env:
      ANDROID_LIBS: android_libs/arm64-v8a
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      # deps.py is the only place these are written down, so a Renovate bump lands
      # in one file and reaches CI, the Makefile and the runtime installers at once.
      # It imports nothing, so a bare python can read it before anything is set up.
      - name: Read the pinned binary versions
        run: |
          for pin in FFMPEG_ANDROID_TAG FFMPEG_ANDROID_ASSET_PATTERN ARIA2_TAG QUICKJS_COMMIT QUICKJS_REPO NDK_VERSION; do
            echo "$pin=$(python3 deps.py "$pin")" >> "$GITHUB_ENV"
          done

      - name: Install Python dependencies
        run: uv sync --locked

      # flet builds the APK with Flutter, and it only accepts the exact Flutter
      # version it was built against: `channel: stable` handed it 3.44.6, flet wanted
      # 3.41.2, and it stopped dead on "Flutter SDK not found or invalid version".
      #
      # Read the version out of the installed flet rather than pinning it here. A pin
      # would be a second place to remember, and it would go stale the next time
      # Renovate bumps flet, which is the moment nobody is watching.
      - name: Read the Flutter version flet was built against
        id: flutter
        run: |
          version=$(uv run python -c "from flet.version import flutter_version; print(flutter_version)")
          echo "flet $(uv run python -c "import importlib.metadata as m; print(m.version('flet'))") wants Flutter $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # No `cache: gradle` here. The Gradle project does not exist at checkout time,
      # `flet build` generates it, so the action finds nothing to key a cache on and
      # fails the job before it has started.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter.outputs.version }}
          channel: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache the NDK
        id: ndk-cache
        uses: actions/cache@v6
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          key: ndk-${{ env.NDK_VERSION }}

      - name: Install the NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;${NDK_VERSION}"

      - name: Fetch FFmpeg
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$ANDROID_LIBS"
          rm -rf /tmp/ffmpeg-android && mkdir -p /tmp/ffmpeg-android
          gh release download "$FFMPEG_ANDROID_TAG" --repo "$(python3 deps.py FFMPEG_ANDROID_REPO)" \
            --pattern "$FFMPEG_ANDROID_ASSET_PATTERN" --dir /tmp/ffmpeg-android
          # The asset carries the build number, and the directory inside it carries
          # the same. Read both back rather than guessing either.
          archive=$(find /tmp/ffmpeg-android -name '*.tar.xz')
          tar xf "$archive" -C /tmp/ffmpeg-android
          unpacked=$(find /tmp/ffmpeg-android -mindepth 1 -maxdepth 1 -type d)
          cp "$unpacked/bin/ffmpeg" "$unpacked/bin/ffprobe" "$ANDROID_LIBS/"
          cp "$unpacked"/lib/*.so "$ANDROID_LIBS/"

      - name: Fetch aria2c
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$ARIA2_TAG" --repo "$(python3 deps.py ARIA2_REPO)" \
            --pattern "aria2c-android-aarch64" --pattern "SHA256SUMS" --dir /tmp --clobber
          (cd /tmp && grep " aria2c-android-aarch64$" SHA256SUMS | sha256sum -c -)
          cp /tmp/aria2c-android-aarch64 "$ANDROID_LIBS/aria2c"
          chmod +x "$ANDROID_LIBS/aria2c"

      - name: Cache the QuickJS build
        id: quickjs-cache
        uses: actions/cache@v6
        with:
          path: android_libs/qjs
          key: quickjs-${{ env.QUICKJS_COMMIT }}-ndk-${{ env.NDK_VERSION }}

      - name: Build QuickJS for ARM64
        if: steps.quickjs-cache.outputs.cache-hit != 'true'
        run: |
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          git clone "$QUICKJS_REPO" /tmp/quickjs-bellard
          cd /tmp/quickjs-bellard
          git checkout "$QUICKJS_COMMIT"
          CC="$NDK_BIN/clang --target=aarch64-linux-android24 --sysroot=$NDK_BIN/../sysroot"
          CFLAGS="-D_GNU_SOURCE -DCONFIG_VERSION=\"$(cat VERSION)\" -O2 -flto -funsigned-char -fwrapv"
          for f in qjs quickjs quickjs-libc cutils dtoa libregexp libunicode; do
            $CC $CFLAGS -c -o $f.o $f.c
          done
          echo 'const unsigned char qjsc_repl[] = {0}; const unsigned int qjsc_repl_size = 0;' > repl_stub.c
          $CC $CFLAGS -c -o repl_stub.o repl_stub.c
          $CC -static -flto -o qjs qjs.o quickjs.o quickjs-libc.o cutils.o dtoa.o libregexp.o libunicode.o repl_stub.o -lm -ldl
          $NDK_BIN/llvm-strip qjs
          mkdir -p "$GITHUB_WORKSPACE/android_libs"
          cp qjs "$GITHUB_WORKSPACE/android_libs/qjs"

      - name: Stage QuickJS
        run: cp android_libs/qjs "$ANDROID_LIBS/qjs"

      # The solver library is versioned together with the yt-dlp-ejs package that
      # yt-dlp pulls in. Read the version back out of what is actually installed,
      # so it cannot disagree with the lock file the way a second pin would.
      - name: Fetch the EJS solver lib
        run: |
          ejs_version=$(uv run python -c "import importlib.metadata as m; print(m.version('yt-dlp-ejs'))")
          echo "yt-dlp resolved yt-dlp-ejs $ejs_version"
          ejs_dir=$(uv run python -c "import yt_dlp, os; print(os.path.join(os.path.dirname(yt_dlp.__file__), 'extractor/youtube/jsc/_builtin/vendor'))")
          curl -fSL -o "$ejs_dir/yt.solver.lib.js" \
            "https://github.com/yt-dlp/ejs/releases/download/${ejs_version}/yt.solver.lib.js"

      - name: Inject native libs
        run: |
          JNILIBS=build/flutter/android/app/src/main/jniLibs/arm64-v8a
          mkdir -p "$JNILIBS"
          cp "$ANDROID_LIBS/ffmpeg" "$JNILIBS/libffmpeg.so"
          cp "$ANDROID_LIBS/ffprobe" "$JNILIBS/libffprobe.so"
          cp "$ANDROID_LIBS"/lib*.so "$JNILIBS/"
          cp "$ANDROID_LIBS/qjs" "$JNILIBS/libqjs.so"
          cp "$ANDROID_LIBS/aria2c" "$JNILIBS/libaria2c.so"

      # Without a signing config, Flutter falls back to the Android debug key, which
      # is public and shared by every debug build on earth. An APK signed with it
      # accrues no Play Protect reputation, and Android refuses an update signed by a
      # different key, so shipping on the debug key means every user has to uninstall
      # to ever get off it. Sign with the release key; the check after the build
      # refuses to publish if this ever silently falls back again.
      - name: Decode the release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is unset, and an unsigned release APK is not worth publishing"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      # arm64-v8a only, on purpose. The native libs above are injected into that
      # ABI alone, and ffmpeg, aria2c and qjs are only built for aarch64 upstream,
      # so an armeabi-v7a or x86_64 APK would install and then fail at the first
      # download or mux. Publishing one working APK beats publishing three of
      # which two are broken.
      - name: Build APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          uv run flet build apk \
            --project video-dl \
            --org com.videodl \
            --product "Video-dl" \
            --description "Download and encode videos" \
            --module-name main_android \
            --compile-app --compile-packages --cleanup-packages \
            --skip-flutter-doctor \
            --split-per-abi \
            --exclude .venv venv dist .git .mypy_cache .ruff_cache .pytest_cache \
              __pycache__ .coverage "*.log" "*.egg-info" tests docs \
              htmlcov .tox build Makefile "*.icns" "*.ico" "*.spec" \
              check_results.txt test_outdir android_libs \
            --android-permissions INTERNET=True WRITE_EXTERNAL_STORAGE=True READ_EXTERNAL_STORAGE=True MANAGE_EXTERNAL_STORAGE=True \
            --android-adaptive-icon-background "#7C3AED" \
            --android-signing-key-store "$RUNNER_TEMP/release.jks" \
            --android-signing-key-store-password "$ANDROID_KEYSTORE_PASSWORD" \
            --android-signing-key-password "$ANDROID_KEYSTORE_PASSWORD" \
            --android-signing-key-alias video-dl

      - name: Keep only the ABI we ship
        run: |
          shopt -s nullglob
          apk=(build/apk/*arm64-v8a*.apk)
          if [ ${#apk[@]} -ne 1 ]; then
            echo "::error::expected exactly one arm64-v8a APK, found ${#apk[@]}"
            exit 1
          fi
          mkdir -p release_apk
          mv "${apk[0]}" release_apk/video-dl-arm64-v8a.apk
          ls -lh release_apk/

      # The fingerprint of the release key, in the clear on purpose: it is the same
      # value registered with the Android Developer Console, and it is public by
      # construction, every installed APK carries the certificate it was signed with.
      # Pinning it here is what makes the signature mean something. A build signed
      # with anything else, the debug key included, does not leave this job.
      - name: Verify the APK signature
        env:
          EXPECTED_SHA256: "8A:67:2B:69:DA:85:AE:7C:33:CE:61:F1:CC:E1:A8:99:9B:F7:A7:22:F9:18:36:AE:72:6B:02:45:85:E7:69:30"
        run: |
          apksigner=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)
          "$apksigner" verify --print-certs --verbose release_apk/video-dl-arm64-v8a.apk | tee certs.txt
          grep -qx "Verified using v2 scheme (APK Signature Scheme v2): true" certs.txt \
            || { echo "::error::APK is not v2-signed"; exit 1; }
          # Match on "certificate SHA-256 digest:" alone. --verbose labels the line
          # "V2 Signer:" where plain --print-certs labels it "Signer #1", and only
          # the certificate lines carry that phrase, the public key ones say
          # "public key SHA-256 digest". Anchoring on the label matched neither.
          actual=$(grep -m1 "certificate SHA-256 digest:" certs.txt | awk '{print $NF}')
          if [ -z "$actual" ]; then
            echo "::error::could not read a signer fingerprint out of apksigner's output"
            exit 1
          fi
          expected=$(echo "$EXPECTED_SHA256" | tr -d ': ' | tr 'A-Z' 'a-z')
          if [ "$actual" != "$expected" ]; then
            echo "::error::APK signed with the wrong key: got $actual, expected $expected"
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: release_apk/video-dl-arm64-v8a.apk

  # Everything up to here builds and verifies. Everything from here publishes, and
  # publishing only ever makes sense for a tag: the version is read out of the ref
  # (`${GITHUB_REF_NAME#v}`), and the tufup channel's version counters only go up.
  # A workflow_dispatch on a branch used to walk straight into the release job and
  # publish "master". Now it stops here, which also makes a dispatch on a branch the
  # way to dry-run a build. auto-release dispatches on the tag ref, so it is unaffected.
  sign:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Restore signing keys
        run: |
          mkdir -p keystore
          echo "${{ secrets.TUFUP_PRIVATE_KEY }}" | base64 -d > keystore/video_dl_key
          chmod 600 keystore/video_dl_key
          echo "${{ secrets.TUFUP_PUBLIC_KEY }}" | base64 -d > keystore/video_dl_key.pub
          echo "${{ secrets.TUFUP_CONFIG }}" | base64 -d > .tufup-repo-config

      # The tufup repository is the state of the update channel: its snapshot and
      # timestamp version numbers only ever go up, and a client rejects metadata
      # that goes backwards. Restoring a fresh repo instead of the real one would
      # reset those counters to 1 and permanently brick auto-update for everyone
      # already installed. So a failed restore fails the release. Bootstrapping an
      # empty channel is a deliberate act: set the TUFUP_BOOTSTRAP repository
      # variable to 1 for that one run.
      - name: Restore tufup repository
        env:
          GH_TOKEN: ${{ github.token }}
          TUFUP_REPO_ARCHIVE: ${{ secrets.TUFUP_REPO_ARCHIVE }}
          TUFUP_BOOTSTRAP: ${{ vars.TUFUP_BOOTSTRAP }}
        run: |
          set -euo pipefail
          if gh release download --repo "$GITHUB_REPOSITORY" --pattern "tufup-repo.tar.gz" --dir /tmp; then
            tar -xzf /tmp/tufup-repo.tar.gz
            echo "Restored the tufup repo from the previous release"
          elif [ -n "${TUFUP_REPO_ARCHIVE:-}" ]; then
            echo "$TUFUP_REPO_ARCHIVE" | base64 -d | tar -xzf -
            echo "Restored the tufup repo from the TUFUP_REPO_ARCHIVE secret"
          elif [ "${TUFUP_BOOTSTRAP:-}" = "1" ]; then
            mkdir -p repository/metadata repository/targets
            cp root.json repository/metadata/root.json
            echo "Bootstrapped a fresh tufup repo (TUFUP_BOOTSTRAP=1)"
          else
            echo "::error::Could not restore the tufup repository from the previous release."
            echo "::error::Publishing now would reset TUF metadata versions and break auto-update"
            echo "::error::for every installed client. Fix the restore, or set the TUFUP_BOOTSTRAP"
            echo "::error::repository variable to 1 if you really mean to start a fresh channel."
            exit 1
          fi
          test -f repository/metadata/root.json

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sign all platform artifacts
        run: |
          uv run python -m tools.ci_sign \
            --version "${{ steps.version.outputs.version }}" \
            --artifacts-dir artifacts \
            --keys-dir keystore \
            --repo-dir repository

      - name: Prune old targets from tufup repo
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          find repository/targets -name '*.tar.gz' ! -name "*-${VERSION}.tar.gz" -delete
          echo "Remaining targets:" && ls -lh repository/targets/

      - name: Package signed files
        run: |
          mkdir -p signed
          cp repository/metadata/*.json signed/
          cp repository/targets/*-${{ steps.version.outputs.version }}.tar.gz signed/ 2>/dev/null || true
          tar -czf signed/tufup-repo.tar.gz -C . repository/

      - uses: actions/upload-artifact@v7
        with:
          name: tufup-signed
          path: signed/

  release:
    needs: [build, android, sign]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      # No `|| true` here. A missing binary used to produce a green release with
      # the binary silently absent from it.
      - name: Organize release assets
        run: |
          set -euo pipefail
          mkdir -p binaries tufup
          for binary in video-dl-windows.exe video-dl-windows-setup.exe video-dl-linux video-dl-macos.dmg video-dl-arm64-v8a.apk; do
            mv "artifacts/$binary" binaries/
          done
          mv artifacts/* tufup/
          echo "=== Binaries ===" && ls -la binaries/
          echo "=== Tufup ===" && ls -la tufup/

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            binaries/*
            tufup/*
          body: |
            ## Download

            | Windows | macOS | Linux | Android (ARM64) |
            |:-------:|:-----:|:-----:|:---------------:|
            | [Installer](https://github.com/Kenshin9977/video-dl/releases/download/${{ github.ref_name }}/video-dl-windows-setup.exe) | [video-dl-macos.dmg](https://github.com/Kenshin9977/video-dl/releases/download/${{ github.ref_name }}/video-dl-macos.dmg) | [video-dl-linux](https://github.com/Kenshin9977/video-dl/releases/download/${{ github.ref_name }}/video-dl-linux) | [video-dl-arm64-v8a.apk](https://github.com/Kenshin9977/video-dl/releases/download/${{ github.ref_name }}/video-dl-arm64-v8a.apk) |

            On Windows the installer creates Start Menu and desktop shortcuts. The [portable exe](https://github.com/Kenshin9977/video-dl/releases/download/${{ github.ref_name }}/video-dl-windows.exe) is also available for those who prefer it.

            <details>
            <summary>Auto-update files (internal)</summary>

            The remaining files in this release are used by the built-in auto-updater (tufup). You can safely ignore them.
            </details>
