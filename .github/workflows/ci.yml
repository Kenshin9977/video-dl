name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
      - run: uv sync --locked --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy .

  # A broken renovate.json does not fail loudly: Renovate opens an issue and then
  # stops opening pull requests, so dependency updates just quietly stop happening.
  # That already cost us once (a custom manager with no datasource). Its own
  # validator catches it, so run it here, where it fails a pull request instead.
  #
  # tests/test_deps.py goes further and checks the regexes still match the pins,
  # which the validator does not: a manager that matches nothing is not an error to
  # Renovate, it is a pin that silently never gets bumped.
  renovate-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: npx --yes --package renovate -- renovate-config-validator --strict

      # The validator only checks the schema. It says nothing about whether Renovate
      # can actually *do* anything with what it extracted, and that is where this bit
      # us: it read both binary pins, decided `autobuild-2026-06-15-18-44` and
      # `release-2.0.1` were "unversioned" under `versioning=loose`, and skipped them.
      # No error, no PR, ever. The pins were on rails to nowhere.
      #
      # So run Renovate itself against this checkout and fail if it skips one of them.
      - name: Renovate must not silently skip a pin
        env:
          LOG_LEVEL: debug
          RENOVATE_TOKEN: ${{ github.token }}
          GITHUB_COM_TOKEN: ${{ github.token }}
        run: |
          npx --yes --package renovate -- renovate --platform=local --dry-run=lookup > renovate.log 2>&1 || true

          # Deliberately not every dependency: the Windows signing action is pinned to
          # a moving tag on purpose, and Renovate skipping that one is the right call.
          skipped=$(grep -E "DEBUG: Skipping (Kenshin9977/FFmpeg-Builds|Kenshin9977/aria2|quickjs)" renovate.log || true)
          if [ -n "$skipped" ]; then
            echo "::error::Renovate read a deps.py pin and then dropped it. It will never be bumped."
            echo "$skipped"
            grep -E "unsupported/unversioned" renovate.log || true
            exit 1
          fi
          echo "Renovate tracks every pin in deps.py."

  # The shipped binary is Windows first, and the Windows specific paths (winreg,
  # the ffmpeg install under LOCALAPPDATA) used to never run in CI on any OS.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
      - run: uv sync --locked --extra dev
      - run: uv run pytest --cov=core --cov=gui --cov=i18n --cov=utils --cov-report=term-missing

  # The gate that lets a yt-dlp bump merge unattended. Everything else in the suite
  # mocks the network; this downloads a real file and makes yt-dlp run a real ffmpeg,
  # so it proves the proposed version still works with our two runtime patches.
  #
  # There is deliberately no YouTube check here. It was tried: YouTube answers a
  # GitHub runner with "Sign in to confirm you're not a bot", every time, because the
  # request comes from a datacenter IP. A check that can never pass is not a check,
  # it is a red light you learn to walk past. Covering YouTube for real needs a
  # runner on a residential address, or cookies in a secret that go stale.
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
      - run: uv sync --locked --extra dev
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Download a real file and check both progress bars
        run: uv run pytest -m network -v

  # A release tag used to be the first time PyInstaller ever ran against a change,
  # and release.sh pushes the tag before the build proves anything. Freeze the
  # binary here instead, and run the same import selftest the release runs, so a
  # broken spec or a missing hiddenimport fails on the pull request.
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
      - run: uv sync --locked --extra dev
      - run: uv run pyinstaller specs/Windows-video-dl.spec
      - name: Smoke test the frozen binary
        shell: bash
        run: ./dist/video-dl.exe --selftest
